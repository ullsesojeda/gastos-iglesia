<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de gastos</title>

    <!-- ====== SISTEMA DE TEMAS ====== -->
    <style>
        :root {
            --bg: #f4f4f4;
            --card-bg: #ffffff;
            --text: #222;
            --border: #ccc;
        }

        .dark-theme {
            --bg: #1e1e1e;
            --card-bg: #2a2a2a;
            --text: #e6e6e6;
            --border: #444;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, sans-serif;
            margin: 0;
        }

        .container {
            max-width: 700px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 25px;
            margin-top: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .card-header {
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }

        .btn-primary { background: #0d6efd; color: white; }
        .btn-secondary { background: #6c757d; color: white; }

        .theme-toggle {
            float: right;
            margin-bottom: 15px;
            background: #444;
            color: white;
            border-radius: 6px;
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()">Cambiar tema</button>

<div class="container">

    <div class="card">
        <div class="card-header">Registro de Gastos</div>

        <form method="POST">

            <label>Fecha:</label>
            <input type="date" class="form-control" name="fecha" value="{{ gasto[1] if gasto else '' }}" required>

            <label>Pagado a:</label>
            <input type="text" class="form-control" name="pagado_a" value="{{ gasto[2] if gasto else '' }}" required>

            <label>Concepto:</label>
            <input type="text" class="form-control" name="concepto" value="{{ gasto[3] if gasto else '' }}" required>

            <label>Observaciones:</label>
            <input type="text" class="form-control" name="observaciones" value="{{ gasto[4] if gasto else '' }}"required>

            <label>Responsable:</label>
            <select class="form-select" name="responsable" required>
                {% set resp = gasto[5] if gasto else '' %}
                <option value="">(espacio en blanco)</option>
                <option value="ULISES" {% if resp == 'ULISES' %}selected{% endif %}>ULISES</option>
                <option value="TIMO" {% if resp == 'TIMO' %}selected{% endif %}>TIMO</option>
                <option value="OTRO" {% if resp == 'OTRO' %}selected{% endif %}>OTRO</option>
                <option value=" " {% if resp == 'OTRO' %}selected{% endif %}> </option>
            </select>

            <label>Importe:</label>
            <input type="number" step="0.01" class="form-control" name="importe" value="{{ gasto[6] if gasto else '' }}" required>

            <div class="text-center mt-3">
                <button type="submit" class="btn btn-primary">
                    {{ 'Actualizar' if gasto else 'Guardar' }}
                </button>

                <a href="/gastos" class="btn btn-secondary">Regresar</a>
            </div>

        </form>
    </div>

</div>

<!-- SCRIPT PARA CAMBIO DE TEMA -->
<script>
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-theme");
    }

    function toggleTheme() {
        document.body.classList.toggle("dark-theme");

        if (document.body.classList.contains("dark-theme")) {
            localStorage.setItem("theme", "dark");
        } else {
            localStorage.setItem("theme", "light");
        }
    }
</script>

</body>
</html>
